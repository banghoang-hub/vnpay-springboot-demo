server.port=8080
spring.application.name=vnpay springboot demo HB 1

vnpay.pay-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.tmn-code=${VNPAY_TMN_CODE:YOUR_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET:YOUR_HASH_SECRET}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/payment/vnpay-return}
vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/payment/vnpay-ipn}

vnpay.version=2.1.0
vnpay.command=pay
vnpay.currency-code=VND
vnpay.locale=vn
vnpay.order-type=other
